<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Team Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-alt: #263244;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
      --sidebar-width: 240px;
      --header-height: 56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .header h1 span { color: var(--accent); }
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 100ms ease;
    }
    .hamburger:hover { background: var(--surface-alt); }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: calc(100vh - var(--header-height));
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: var(--header-height);
      height: calc(100vh - var(--header-height));
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0 20px 8px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      transition: background 100ms ease, color 100ms ease;
      border-left: 3px solid transparent;
      cursor: pointer;
    }
    .nav-link:hover {
      background: var(--surface-alt);
      color: var(--text);
    }
    .nav-link.active {
      background: var(--surface-alt);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-link i { width: 16px; text-align: center; font-size: 0.9rem; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 32px;
      overflow-x: hidden;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 56px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .section.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .section-heading {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-heading i { color: var(--accent); font-size: 1rem; }

    /* ── Stats Banner ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 20px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
      gap: 20px;
    }

    /* ── Project Card ── */
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.2s ease;
      cursor: default;
    }
    .project-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .project-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-completed { background: rgba(148,163,184,0.15); color: var(--muted); }
    .github-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.1rem;
      transition: color 100ms ease;
      flex-shrink: 0;
    }
    .github-link:hover { color: var(--text); }

    /* Pipeline */
    .pipeline-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .pipeline-stages {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
    }
    .stage-pill {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: var(--border);
      position: relative;
      cursor: default;
    }
    .stage-pill.done { background: var(--accent); }
    .stage-pill .tooltip {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      color: var(--text);
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 100ms ease;
      border: 1px solid var(--border);
      z-index: 10;
    }
    .stage-pill:hover .tooltip { opacity: 1; }

    /* Last Commit */
    .last-commit {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .last-commit-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .last-commit-msg {
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .last-commit-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* Stats row */
    .card-stats {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Agent Card ── */
    .agent-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.2s ease;
    }
    .agent-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .agent-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .agent-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .agent-id {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .agent-role {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .agent-model {
      display: inline-flex;
      align-items: center;
      background: rgba(99,102,241,0.15);
      color: var(--accent-hover);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .stars {
      display: flex;
      gap: 2px;
      margin-bottom: 10px;
      color: var(--yellow);
      font-size: 0.8rem;
    }
    .star-empty { color: var(--border); }
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.idle { background: var(--green); }
    .status-dot.working { background: var(--yellow); }
    .status-dot.error { background: var(--red); }
    .status-text {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
    }
    .agent-task {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Activity Feed ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
      font-family: inherit;
    }
    .filter-btn:hover {
      background: var(--surface-alt);
      color: var(--text);
    }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .feed-list { display: flex; flex-direction: column; gap: 2px; }
    .feed-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      transition: background 100ms ease;
      opacity: 0;
      transform: translateX(-10px);
      animation: feedIn 0.3s ease forwards;
    }
    .feed-row:hover { background: var(--surface-alt); }
    @keyframes feedIn {
      to { opacity: 1; transform: translateX(0); }
    }
    .feed-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .feed-icon.commit { background: rgba(59,130,246,0.2); color: var(--blue); }
    .feed-icon.test { background: rgba(168,85,247,0.2); color: var(--purple); }
    .feed-icon.deploy { background: rgba(34,197,94,0.2); color: var(--green); }
    .feed-icon.review { background: rgba(249,115,22,0.2); color: var(--orange); }
    .feed-body { flex: 1; min-width: 0; }
    .feed-msg {
      font-size: 0.82rem;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .feed-author { font-size: 0.72rem; color: var(--muted); }
    .feed-time {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 3px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        left: -260px;
        top: var(--header-height);
        height: calc(100vh - var(--header-height));
        z-index: 200;
        transition: left 0.25s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.4);
      }
      .sidebar.open { left: 0; }
      .hamburger { display: block; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 20px 16px; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
      .agent-cards-grid { grid-template-columns: 1fr; }
      .main { padding: 16px 12px; }
    }

    .sidebar-overlay {
      display: block;
      position: fixed;
      inset: 0;
      top: var(--header-height);
      background: rgba(0,0,0,0.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .sidebar-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

<!-- Data loaded from data.json -->

<!-- ── Header ── -->
<header class="header">
  <button class="hamburger" id="hamburger" aria-label="Toggle sidebar" aria-expanded="false">
    <i class="fa-solid fa-bars"></i>
  </button>
  <h1><span>Dream</span> Team Dashboard</h1>
</header>

<!-- ── Layout ── -->
<div class="layout">

  <!-- ── Sidebar Overlay (mobile) ── -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ── Sidebar ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Навигация / Nav</div>
    <a class="nav-link active" data-section="stats" href="#stats">
      <i class="fa-solid fa-chart-bar"></i> Статистика / Stats
    </a>
    <a class="nav-link" data-section="projects" href="#projects">
      <i class="fa-solid fa-folder-open"></i> Проекты / Projects
    </a>
    <a class="nav-link" data-section="agents" href="#agents">
      <i class="fa-solid fa-robot"></i> Агенты / Agents
    </a>
    <a class="nav-link" data-section="activity" href="#activity">
      <i class="fa-solid fa-bolt"></i> Активность / Activity
    </a>
  </nav>

  <!-- ── Main Content ── -->
  <main class="main">

    <!-- Stats Section -->
    <section class="section visible" id="stats">
      <h2 class="section-heading">
        <i class="fa-solid fa-chart-bar"></i> Статистика / Stats
      </h2>
      <div class="stats-grid" id="stats-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- Projects Section -->
    <section class="section" id="projects">
      <h2 class="section-heading">
        <i class="fa-solid fa-folder-open"></i>
        Проекты / Projects
      </h2>
      <div class="cards-grid" id="projects-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- Agents Section -->
    <section class="section" id="agents">
      <h2 class="section-heading">
        <i class="fa-solid fa-robot"></i>
        Агенты / Agents
      </h2>
      <div class="agent-cards-grid" id="agents-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- Activity Section -->
    <section class="section" id="activity">
      <h2 class="section-heading">
        <i class="fa-solid fa-bolt"></i>
        Активность / Activity
      </h2>
      <div class="filter-bar" id="activity-filter">
        <!-- Rendered by JS -->
      </div>
      <div class="feed-list" id="activity-feed">
        <!-- Rendered by JS -->
      </div>
    </section>

  </main>
</div>

<footer style="text-align:center;padding:12px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);">
  <span id="last-updated">Last updated: —</span>
</footer>

<script>
'use strict';

const DEBUG = location.search.includes('debug');

// ── Data Loading ──────────────────────────────────────────────
let projects = [], agents = [], activity = [];

async function loadData() {
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    projects = data.projects || [];
    agents   = data.agents   || [];
    activity = data.activity || [];
    if (data.updated_at) {
      const el = document.getElementById('last-updated');
      if (el) el.textContent = 'Last updated: ' + new Date(data.updated_at).toLocaleString();
    }
  } catch (e) {
    console.error('[data] Failed to load data.json', e);
    const main = document.querySelector('.main');
    if (main) {
      const banner = document.createElement('div');
      banner.style.cssText = 'background:#7f1d1d;color:#fca5a5;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;';
      banner.textContent = 'Failed to load dashboard data. Check that data.json is available.';
      main.prepend(banner);
    }
  }
  if (DEBUG) console.log('[init] data loaded', { projects: projects.length, agents: agents.length, activity: activity.length });
}

// ── Helpers ───────────────────────────────────────────────────
function relativeTime(isoDate) {
  const diff = Date.now() - new Date(isoDate).getTime();
  if (diff < 0) return 'just now';
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins < 60)  return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  return `${days}d ago`;
}

function esc(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function safeHref(url) {
  return /^https?:\/\//.test(url) ? esc(url) : '#';
}

function truncate(str, len) {
  return str.length > len ? str.slice(0, len) + '…' : str;
}

function initials(role) {
  return role.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function renderStars(trustLevel) {
  let html = '<div class="stars">';
  for (let i = 1; i <= 5; i++) {
    if (i <= trustLevel) {
      html += '<i class="fa-solid fa-star"></i>';
    } else if (i - 0.5 <= trustLevel) {
      html += '<i class="fa-solid fa-star-half-stroke"></i>';
    } else {
      html += '<i class="fa-regular fa-star star-empty"></i>';
    }
  }
  html += '</div>';
  return html;
}

// ── Stats Counters ────────────────────────────────────────────
function animateCounter(el, target, duration) {
  if (DEBUG) console.log('[stats] animating counter', { target, duration });
  const start = performance.now();
  function step(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(eased * target).toLocaleString();
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderStats() {
  const totalLoc     = projects.reduce((s, p) => s + p.stats.loc, 0);
  const totalCommits = activity.filter(a => a.type === 'commit').length;
  const activeAgents = agents.filter(a => a.status !== 'idle').length;

  const statsData = [
    { label: 'Проекты / Projects',          value: projects.length },
    { label: 'Строк кода / Lines of Code',  value: totalLoc        },
    { label: 'Коммитов / Commits',          value: totalCommits    },
    { label: 'Активных агентов / Active Agents', value: activeAgents },
  ];

  if (DEBUG) console.log('[stats] counters started', { projects: projects.length, loc: totalLoc, commits: totalCommits, activeAgents });

  const grid = document.getElementById('stats-grid');
  grid.innerHTML = statsData.map(s => `
    <div class="stat-card">
      <div class="stat-value" data-target="${s.value}">0</div>
      <div class="stat-label">${esc(s.label)}</div>
    </div>
  `).join('');

  grid.querySelectorAll('.stat-value').forEach(el => {
    animateCounter(el, parseInt(el.dataset.target, 10), 1200);
  });
}

// ── Projects ──────────────────────────────────────────────────
function renderProjects() {
  const grid = document.getElementById('projects-grid');

  grid.innerHTML = projects.map(p => {
    const donePct = p.pipeline.length ? Math.round((p.pipeline.filter(s => s.done).length / p.pipeline.length) * 100) : 0;
    const stageHtml = p.pipeline.map(s =>
      `<div class="stage-pill${s.done ? ' done' : ''}">
         <span class="tooltip">${s.name}</span>
       </div>`
    ).join('');

    return `
      <article class="project-card">
        <div class="card-header">
          <div>
            <div class="card-title">${esc(p.name)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            <span class="badge badge-${esc(p.status)}">${p.status === 'active' ? 'Active' : 'Completed'}</span>
            <a class="github-link" href="${safeHref(p.github_url)}" target="_blank" rel="noopener" title="GitHub">
              <i class="fa-brands fa-github"></i>
            </a>
          </div>
        </div>
        <p class="card-desc">${esc(p.description)}</p>
        <div class="pipeline-label">
          <span>Pipeline</span>
          <span>${donePct}%</span>
        </div>
        <div class="pipeline-stages">${stageHtml}</div>
        <div class="last-commit">
          <div class="last-commit-label">Последний коммит / Last Commit</div>
          <div class="last-commit-msg">${esc(truncate(p.last_commit.message, 60))}</div>
          <div class="last-commit-meta">${relativeTime(p.last_commit.date)} · ${esc(p.last_commit.author)}</div>
        </div>
        <div class="card-stats">${p.stats.files} files · ${p.stats.loc.toLocaleString()} LOC</div>
      </article>
    `;
  }).join('');

  // Stagger card animations
  grid.querySelectorAll('.project-card').forEach((card, i) => {
    setTimeout(() => card.classList.add('visible'), i * 80);
  });

  if (DEBUG) console.log('[projects] rendered', projects.length, 'cards');
}

// ── Agents ────────────────────────────────────────────────────
function renderAgents() {
  const grid = document.getElementById('agents-grid');

  const statusLabel = { idle: 'Idle', working: 'Working', error: 'Error' };

  grid.innerHTML = agents.map(a => {
    const taskHtml = a.status === 'working'
      ? `<div class="agent-task">${esc(a.current_task)}</div>`
      : a.status === 'error'
        ? `<div class="agent-task" style="color:var(--red)">${esc(a.current_task)}</div>`
        : `<div class="agent-task">— нет активных задач</div>`;

    return `
      <article class="agent-card">
        <div class="agent-avatar">${esc(initials(a.role))}</div>
        <div class="agent-id">${esc(a.id)}</div>
        <div class="agent-role">${esc(a.role)}</div>
        <div class="agent-model">${esc(a.model)}</div>
        ${renderStars(a.trust_level)}
        <div class="status-row">
          <div class="status-dot ${esc(a.status)}"></div>
          <span class="status-text">Статус / Status: ${statusLabel[a.status]}</span>
        </div>
        ${taskHtml}
      </article>
    `;
  }).join('');

  grid.querySelectorAll('.agent-card').forEach((card, i) => {
    setTimeout(() => card.classList.add('visible'), i * 80);
  });

  if (DEBUG) console.log('[agents] rendered', agents.length, 'cards');
}

// ── Activity Feed ─────────────────────────────────────────────
const typeIcon = {
  commit: 'fa-code-commit',
  test:   'fa-vial',
  deploy: 'fa-rocket',
  review: 'fa-eye',
};

function renderFeed(project) {
  const filtered = (project === 'all'
    ? activity
    : activity.filter(a => a.project === project))
    .slice().sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const feed = document.getElementById('activity-feed');
  feed.innerHTML = filtered.map((item, i) => `
    <div class="feed-row" style="animation-delay:${i * 40}ms">
      <div class="feed-icon ${item.type}">
        <i class="fa-solid ${typeIcon[item.type] || 'fa-circle-dot'}"></i>
      </div>
      <div class="feed-body">
        <div class="feed-msg">${esc(item.message)}</div>
        <div class="feed-author">${esc(item.project)} · ${esc(item.author)}</div>
      </div>
      <div class="feed-time">${relativeTime(item.timestamp)}</div>
    </div>
  `).join('');

  if (DEBUG) console.log('[activity] filter changed', { project, visible: filtered.length });
}

function renderActivityFilters() {
  const projects_in_feed = ['all', ...new Set(activity.map(a => a.project))];
  const bar = document.getElementById('activity-filter');

  bar.innerHTML = projects_in_feed.map(p => `
    <button class="filter-btn${p === 'all' ? ' active' : ''}" data-project="${p}">
      ${p === 'all' ? 'All Projects' : p}
    </button>
  `).join('');

  bar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed(btn.dataset.project);
  });

  renderFeed('all');
}

// ── Intersection Observer (section reveal) ────────────────────
function initSectionObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll('.section').forEach(s => observer.observe(s));
}

// ── Active Nav Highlight on Scroll ────────────────────────────
function initNavHighlight() {
  const sections = ['stats', 'projects', 'agents', 'activity'];
  const links = document.querySelectorAll('.nav-link');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      entry.target.dataset.visible = entry.isIntersecting ? '1' : '0';
    });
    // Always pick the topmost visible section to avoid flicker when two overlap
    const active = sections
      .map(id => document.getElementById(id))
      .filter(el => el?.dataset.visible === '1')
      .sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top)[0];
    if (active) {
      links.forEach(l => l.classList.remove('active'));
      const activeLink = document.querySelector(`.nav-link[data-section="${active.id}"]`);
      if (activeLink) activeLink.classList.add('active');
    }
  }, { threshold: 0.1 });

  sections.forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el);
  });

  links.forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      const target = document.getElementById(link.dataset.section);
      if (target) target.scrollIntoView({ behavior: 'smooth' });
      // Close sidebar on mobile
      if (window.innerWidth <= 900) {
        document.getElementById('sidebar').classList.remove('open');
      }
    });
  });
}

// ── Hamburger ─────────────────────────────────────────────────
function initHamburger() {
  const btn = document.getElementById('hamburger');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');

  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
    btn.setAttribute('aria-expanded', 'false');
  }

  btn.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    overlay.classList.toggle('visible', isOpen);
    btn.setAttribute('aria-expanded', isOpen);
  });

  overlay.addEventListener('click', closeSidebar);

  document.addEventListener('click', e => {
    if (!sidebar.contains(e.target) && !btn.contains(e.target) && !overlay.contains(e.target)) {
      closeSidebar();
    }
  });
}

// ── Bootstrap ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  renderStats();
  renderProjects();
  renderAgents();
  renderActivityFilters();
  initSectionObserver();
  initNavHighlight();
  initHamburger();
});
</script>
</body>
